<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="#1A1917"/>

  <!-- Book spine (gold bar left) -->
  <rect x="88" y="88" width="52" height="336" rx="14" fill="#D4A017"/>

  <!-- Book pages (cream) -->
  <rect x="132" y="88" width="292" height="336" rx="14" fill="#F5F0E8"/>

  <!-- Header gold bar -->
  <rect x="160" y="136" width="236" height="28" rx="6" fill="#D4A017"/>

  <!-- Row lines -->
  <rect x="160" y="188" width="148" height="11" rx="4" fill="#C8B89A" opacity="0.6"/>
  <rect x="160" y="215" width="168" height="11" rx="4" fill="#C8B89A" opacity="0.6"/>
  <rect x="160" y="242" width="128" height="11" rx="4" fill="#C8B89A" opacity="0.6"/>
  <rect x="160" y="269" width="158" height="11" rx="4" fill="#C8B89A" opacity="0.6"/>
  <rect x="160" y="296" width="138" height="11" rx="4" fill="#C8B89A" opacity="0.6"/>

  <!-- Amount column (right side) -->
  <rect x="316" y="188" width="76" height="11" rx="4" fill="#D4A017" opacity="0.85"/>
  <rect x="316" y="215" width="76" height="11" rx="4" fill="#D4A017" opacity="0.85"/>
  <rect x="316" y="242" width="76" height="11" rx="4" fill="#D4A017" opacity="0.85"/>
  <rect x="316" y="269" width="76" height="11" rx="4" fill="#D4A017" opacity="0.85"/>
  <rect x="316" y="296" width="76" height="11" rx="4" fill="#D4A017" opacity="0.85"/>

  <!-- Divider line before total -->
  <rect x="160" y="326" width="232" height="3" rx="1.5" fill="#D4A017"/>

  <!-- Total row highlight -->
  <rect x="160" y="336" width="232" height="28" rx="6" fill="#D4A017" opacity="0.2"/>
  <rect x="316" y="336" width="76" height="28" rx="6" fill="#D4A017"/>
</svg>
